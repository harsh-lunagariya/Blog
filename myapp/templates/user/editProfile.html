{% extends "layout.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

  <div class="flex min-h-screen flex-col items-center justify-center px-6 py-12 lg:px-8">
    <!-- Header -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
      <h2 class="text-4xl font-semibold tracking-tight text-gray-900">Edit Your Profile</h2>
      <p class="mt-2 text-lg text-gray-600">Update your bio to express yourself better.</p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-gray-100 rounded-lg px-6 py-8 shadow-sm border border-gray-200">
        <form class="space-y-6" action="{% url 'editProfile' user.username %} " method="POST">
          {% csrf_token %}
          <!-- Bio Field -->
          <div>
            <label for="bio" class="block text-sm font-medium text-gray-700">Your Bio</label>
            <div class="mt-2">
              <textarea id="bio" name="bio" required
                class="block w-full h-40 rounded-md border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 focus:border-gray-500 focus:ring-1 focus:ring-gray-500 sm:text-sm"
                placeholder="Write something about yourself..." >{{form.instance.bio}}</textarea>
            </div>
          </div>

          <!-- Submit -->
          <div>
            <button type="submit"
              class="w-full flex justify-center rounded-md bg-gray-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200">
              Save Changes
            </button>
          </div>

          <!-- Back Button -->
         <div class="flex justify-end">
            <a href="{% url "profile" user.username %}"
              class="py-2.5 px-5 text-sm font-medium text-gray-900 bg-white rounded-full border border-gray-200 hover:bg-gray-300 hover:text-gray-700 focus:ring-4 focus:ring-gray-100">
              Back To Profile
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}

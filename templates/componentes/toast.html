{% if messages %}
<div class="fixed top-5 right-5 z-50 space-y-3">
    {% for message in messages %}
    <div
        x-data="{ show: true }"
        x-show="show"
        x-init="setTimeout(() => show = false, 4000)"
        x-transition:enter="transform transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-x-2"
        x-transition:enter-end="opacity-100 translate-x-0"
        x-transition:leave="transform transition ease-in duration-300"
        x-transition:leave-start="opacity-100 translate-x-0"
        x-transition:leave-end="opacity-0 translate-x-2"
        class="
        px-4 py-3 rounded-lg shadow-md text-white flex items-center justify-between
        {% if 'success' in message.tags %} bg-green-600
        {% elif 'error' in message.tags %} bg-red-700
        {% elif 'logout' in message.tags %} bg-red-600
        {% else %} bg-blue-600 {% endif %}
        "
    >
        <span>{{ message }}</span>
        <!-- Close button -->
        <button @click="show = false" class="ml-4 font-bold focus:outline-none">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}

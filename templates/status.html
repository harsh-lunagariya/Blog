<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}404 | Page Not Found{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-white text-gray-800">

    <div class="text-center px-6">
        <h1 class="text-6xl font-bold text-gray-900">{% block status_code %}404 | Page Not Found{% endblock %}</h1>
        <p class="mt-4 text-lg text-gray-600">
            {% block status_msg %}Sorry, the page you are looking for does not exist.{% endblock %}
        </p>

        <div class="mt-8">
            <a href="{% url "home" %}"
               class="inline-block px-6 py-2.5 bg-gray-900 text-white rounded-md text-sm font-medium hover:bg-gray-700 transition">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
